{{ define "content" }}
<header class="header">
    <h1>My Board Game Collection</h1>
    <p class="subtitle">{{ . }} games in your collection</p>
</header>
<a href="/discover" class="action-card action-card-hero">
    <span class="action-icon">&#127919;</span>
    <span class="action-label">Discover</span>
    <span class="action-desc">Find the perfect game for the moment</span>
</a>
<div class="action-grid">
    <a href="/games" class="action-card">
        <span class="action-icon">&#127922;</span>
        <span class="action-label">My Games</span>
    </a>
    <a href="/import" class="action-card">
        <span class="action-icon">&#128229;</span>
        <span class="action-label">Sync from BGG</span>
    </a>
</div>
<a href="/vibes" class="settings-link">Manage Vibes</a>
{{ end }}
