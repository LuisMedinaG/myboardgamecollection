{{ define "content" }}
<header class="text-center pt-8 pb-6">
    <h1 class="text-xl font-bold">My Board Game Collection</h1>
    <p class="text-sm text-muted mt-1">{{ . }} games in your collection</p>
</header>

<a href="/discover" class="flex flex-col items-center justify-center gap-2 bg-accent text-white no-underline rounded-xl px-4 py-8 shadow-card min-h-[140px] transition-all duration-150 active:scale-[0.97] hover:bg-accent-dark mb-4" style="-webkit-tap-highlight-color:transparent">
    <span class="text-[2.5rem] leading-none">&#127919;</span>
    <span class="text-xl font-bold">Discover</span>
    <span class="text-sm opacity-85 text-center">Find the perfect game for the moment</span>
</a>

<div class="grid grid-cols-2 gap-4 mb-4">
    <a href="/games" class="flex flex-col items-center justify-center gap-3 bg-surface border border-edge rounded-xl px-4 py-6 no-underline text-ink shadow-card min-h-[130px] transition-transform duration-100 active:scale-[0.97]" style="-webkit-tap-highlight-color:transparent">
        <span class="text-[2rem] leading-none">&#127922;</span>
        <span class="font-semibold text-center">My Games</span>
    </a>
    <a href="/import" class="flex flex-col items-center justify-center gap-3 bg-surface border border-edge rounded-xl px-4 py-6 no-underline text-ink shadow-card min-h-[130px] transition-transform duration-100 active:scale-[0.97]" style="-webkit-tap-highlight-color:transparent">
        <span class="text-[2rem] leading-none">&#128229;</span>
        <span class="font-semibold text-center">Sync from BGG</span>
    </a>
</div>

<a href="/vibes" class="block text-center mt-6 text-sm text-muted no-underline hover:text-accent hover:underline">Manage Vibes</a>
{{ end }}
