{{ define "content" }}
<div class="login-hero">
    <div class="login-card">
        <h1 class="login-title">Change Password</h1>
        {{ if .Success }}
        <div class="import-success">Password updated successfully.</div>
        {{ else }}
        <form method="post" action="/profile/change-password" class="login-form" id="change-password-form">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input
                    type="password"
                    id="current_password"
                    name="current_password"
                    placeholder="Current password"
                    required
                    autofocus
                    class="form-input login-input"
                >
            </div>
            <div class="form-group">
                <label for="new_password">New Password (min 8 characters)</label>
                <input
                    type="password"
                    id="new_password"
                    name="new_password"
                    placeholder="New password"
                    required
                    minlength="8"
                    class="form-input login-input"
                >
            </div>
            <div class="form-group">
                <label for="new_password2">Confirm New Password</label>
                <input
                    type="password"
                    id="new_password2"
                    name="new_password2"
                    placeholder="Confirm new password"
                    required
                    minlength="8"
                    class="form-input login-input"
                >
            </div>
            <div id="password-error" class="login-error" style="display:none;">Passwords do not match.</div>
            {{ if .Error }}
            <div class="login-error">{{ .Error }}</div>
            {{ end }}
            <button type="submit" class="btn btn-primary login-btn">Update Password</button>
        </form>
        {{ end }}
        <p class="login-note"><a href="/">← Back to home</a></p>
    </div>
</div>
<script>
(function(){
    var form = document.getElementById('change-password-form');
    if (!form) return;
    var pw1 = document.getElementById('new_password');
    var pw2 = document.getElementById('new_password2');
    var errDiv = document.getElementById('password-error');
    form.addEventListener('submit', function(e){
        if (pw1.value !== pw2.value) {
            e.preventDefault();
            errDiv.style.display = 'block';
            pw2.focus();
        } else {
            errDiv.style.display = 'none';
        }
    });
})();
</script>
{{ end }}
