{{ define "content" }}
<div class="min-h-[calc(100dvh-2rem)] flex items-center justify-center py-8">
    <article class="w-full max-w-[400px] bg-surface border border-edge rounded-xl shadow-card px-8 py-10 text-center">
        <h1 class="text-[1.6rem] font-extrabold text-accent mb-6">Change Password</h1>
        {{ if .Success }}
        <div class="bg-accent-soft text-accent border border-accent/20 rounded-lg px-4 py-3 font-medium">Password updated successfully.</div>
        {{ else }}
        <form method="post" action="/profile/change-password" class="flex flex-col gap-3 mb-4" id="change-password-form">
            <label class="text-left text-sm font-semibold text-muted flex flex-col gap-1">
                Current Password
                <input type="password" name="current_password" placeholder="Current password" required autofocus autocomplete="current-password" class="w-full">
            </label>
            <label class="text-left text-sm font-semibold text-muted flex flex-col gap-1">
                New Password <span class="text-[0.85em] font-normal">(min 8 characters)</span>
                <input type="password" name="new_password" placeholder="New password" required minlength="8" autocomplete="new-password" class="w-full">
            </label>
            <label class="text-left text-sm font-semibold text-muted flex flex-col gap-1">
                Confirm New Password
                <input type="password" name="new_password2" placeholder="Confirm new password" required minlength="8" autocomplete="new-password" class="w-full">
            </label>
            <div id="password-error" class="bg-danger-soft text-danger border border-danger-border rounded-lg px-3.5 py-2.5 text-sm text-left" style="display:none;">Passwords do not match.</div>
            {{ if .Error }}
            <div class="bg-danger-soft text-danger border border-danger-border rounded-lg px-3.5 py-2.5 text-sm text-left">{{ .Error }}</div>
            {{ end }}
            <button type="submit" class="btn btn-primary w-full mt-1">Update Password</button>
        </form>
        {{ end }}
        <p class="text-muted text-[0.82rem] mt-4">
            <a href="/" class="text-accent font-semibold hover:underline">← Back to home</a>
        </p>
    </article>
</div>
<script>
(function(){
    var form = document.getElementById('change-password-form');
    if (!form) return;
    var pw1 = form.querySelector('input[name="new_password"]');
    var pw2 = form.querySelector('input[name="new_password2"]');
    var errDiv = document.getElementById('password-error');
    form.addEventListener('submit', function(e){
        if (pw1.value !== pw2.value) {
            e.preventDefault();
            errDiv.style.display = 'block';
            pw2.focus();
        } else {
            errDiv.style.display = 'none';
        }
    });
})();
</script>
{{ end }}
