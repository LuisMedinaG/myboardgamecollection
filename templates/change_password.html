{{ define "content" }}
<div class="login-hero">
    <article class="login-card">
        <h1 class="login-title">Change Password</h1>
        {{ if .Success }}
        <div class="import-success">Password updated successfully.</div>
        {{ else }}
        <form method="post" action="/profile/change-password" class="login-form" id="change-password-form">
            <label>
                Current Password
                <input type="password" name="current_password" placeholder="Current password" required autofocus autocomplete="current-password">
            </label>
            <label>
                New Password (min 8 characters)
                <input type="password" name="new_password" placeholder="New password" required minlength="8" autocomplete="new-password">
            </label>
            <label>
                Confirm New Password
                <input type="password" name="new_password2" placeholder="Confirm new password" required minlength="8" autocomplete="new-password">
            </label>
            <div id="password-error" class="login-error" style="display:none;">Passwords do not match.</div>
            {{ if .Error }}
            <div class="login-error">{{ .Error }}</div>
            {{ end }}
            <button type="submit" class="btn btn-primary login-btn">Update Password</button>
        </form>
        {{ end }}
        <p class="login-note"><a href="/">← Back to home</a></p>
    </article>
</div>
<script>
(function(){
    var form = document.getElementById('change-password-form');
    if (!form) return;
    var pw1 = form.querySelector('input[name="new_password"]');
    var pw2 = form.querySelector('input[name="new_password2"]');
    var errDiv = document.getElementById('password-error');
    form.addEventListener('submit', function(e){
        if (pw1.value !== pw2.value) {
            e.preventDefault();
            errDiv.style.display = 'block';
            pw2.focus();
        } else {
            errDiv.style.display = 'none';
        }
    });
})();
</script>
{{ end }}
