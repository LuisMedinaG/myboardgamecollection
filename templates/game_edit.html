{{ define "content" }}
<a href="/games/{{ .Game.ID }}" class="inline-flex items-center gap-1 text-accent text-sm font-medium py-2 hover:underline" style="-webkit-tap-highlight-color:transparent">&#8592; {{ .Game.Name }}</a>

<header class="text-center pt-4 pb-6">
    <h1 class="text-xl font-bold">Edit Vibes</h1>
    <p class="text-sm text-muted mt-1">{{ .Game.Name }}</p>
</header>

<form method="POST" action="/games/{{ .Game.ID }}/vibes" class="mt-4">
    <div class="flex flex-col gap-2 mb-6">
        {{ range .AllVibes }}
        <label class="flex items-center gap-3 bg-surface border border-edge rounded-lg px-4 py-3 cursor-pointer transition-colors hover:bg-accent-soft" style="-webkit-tap-highlight-color:transparent">
            <input type="checkbox" name="vibes" value="{{ .ID }}"
                {{ if index $.GameVibes .ID }}checked{{ end }}
                class="w-5 h-5 accent-accent">
            <span class="font-semibold">{{ .Name }}</span>
        </label>
        {{ end }}
    </div>
    {{ if eq (len .AllVibes) 0 }}
    <p class="text-center text-muted py-8">No vibes defined yet. <a href="/vibes" class="text-accent font-semibold hover:underline">Create some vibes</a> first.</p>
    {{ end }}
    <button type="submit" class="btn btn-primary btn-block">Save Vibes</button>
</form>
{{ end }}
