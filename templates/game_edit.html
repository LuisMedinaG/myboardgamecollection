{{ define "content" }}
<a href="/games/{{ .Game.ID }}" class="back-btn">&#8592; {{ .Game.Name }}</a>
<header class="header">
    <h1>Edit Vibes</h1>
    <p class="subtitle">{{ .Game.Name }}</p>
</header>
<form method="POST" action="/games/{{ .Game.ID }}/vibes" class="edit-vibes-form">
    <div class="vibe-checklist">
        {{ range .AllVibes }}
        <label class="vibe-check-item">
            <input type="checkbox" name="vibes" value="{{ .ID }}"
                {{ if index $.GameVibes .ID }}checked{{ end }}>
            <span class="vibe-check-label">{{ .Name }}</span>
        </label>
        {{ end }}
    </div>
    {{ if eq (len .AllVibes) 0 }}
    <p class="empty-state">No vibes defined yet. <a href="/vibes">Create some vibes</a> first.</p>
    {{ end }}
    <button type="submit" class="btn btn-primary btn-block">Save Vibes</button>
</form>
{{ end }}
