{{ define "player_aids_list" }}
{{ if eq (len .Aids) 0 }}
    <p class="text-sm text-muted py-3 text-center">No player aids uploaded yet.</p>
{{ else }}
    <div class="grid grid-cols-3 gap-2">
        {{ range $i, $a := .Aids }}
        <div class="bg-surface border border-edge rounded-lg overflow-hidden">
            <img src="/uploads/{{ $a.Filename }}" alt="{{ $a.Label }}"
                 class="w-full aspect-square object-cover block cursor-pointer hover:opacity-90 transition-opacity"
                 onclick="openLightbox({{ $i }})">
            <div class="flex items-center justify-between px-2 py-1.5 gap-1">
                <span class="text-xs font-medium text-muted truncate">{{ $a.Label }}</span>
                <button
                    class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-transparent border-none cursor-pointer text-danger hover:bg-danger-soft transition-colors flex-shrink-0 text-sm"
                    hx-post="/games/{{ $.GameID }}/rules/aids/{{ $a.ID }}/delete"
                    hx-target="#player-aids-list"
                    hx-swap="innerHTML"
                    hx-confirm="Delete this player aid?"
                >
                    &#10005;
                </button>
            </div>
        </div>
        {{ end }}
    </div>
{{ end }}

<!-- Lightbox / Carousel -->
<div class="lightbox" id="lightbox" onclick="handleLightboxClick(event)">
    <button id="lightbox-close"
            class="absolute top-3 right-3 bg-transparent border-none text-white text-[2rem] cursor-pointer leading-none px-2 py-1 opacity-70 hover:opacity-100 transition-opacity"
            onclick="closeLightbox(event)">&times;</button>
    <button id="lightbox-prev"
            class="absolute left-2 top-1/2 -translate-y-1/2 bg-transparent border-none text-white text-[3rem] cursor-pointer leading-none px-3 py-1 opacity-60 hover:opacity-100 transition-opacity select-none"
            onclick="prevImage(event)">&#8249;</button>
    <img class="max-w-[92vw] max-h-[90vh] object-contain rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.5)]"
         id="lightbox-img" src="" alt="">
    <button id="lightbox-next"
            class="absolute right-2 top-1/2 -translate-y-1/2 bg-transparent border-none text-white text-[3rem] cursor-pointer leading-none px-3 py-1 opacity-60 hover:opacity-100 transition-opacity select-none"
            onclick="nextImage(event)">&#8250;</button>
    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/70 text-sm" id="lightbox-counter"></div>
</div>
<script>
(function() {
    var slides = [{{ range .Aids }}{ src: "/uploads/{{ .Filename }}", alt: "{{ .Label }}" },{{ end }}];
    var current = 0;
    var btnPrev = document.getElementById('lightbox-prev');
    var btnNext = document.getElementById('lightbox-next');

    function show(index) {
        if (!slides.length) return;
        current = (index + slides.length) % slides.length;
        var img = document.getElementById('lightbox-img');
        var counter = document.getElementById('lightbox-counter');
        img.src = slides[current].src;
        img.alt = slides[current].alt || '';
        counter.textContent = (current + 1) + ' / ' + slides.length;
        var hidden = slides.length <= 1;
        btnPrev.style.display = hidden ? 'none' : '';
        btnNext.style.display = hidden ? 'none' : '';
    }

    window.openLightbox = function(index) {
        show(index);
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    window.closeLightbox = function(e) {
        e && e.stopPropagation();
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    };

    window.handleLightboxClick = function(e) {
        if (e.target === document.getElementById('lightbox')) closeLightbox(e);
    };

    window.prevImage = function(e) {
        e.stopPropagation();
        show(current - 1);
    };

    window.nextImage = function(e) {
        e.stopPropagation();
        show(current + 1);
    };

    document.addEventListener('keydown', function(e) {
        var lb = document.getElementById('lightbox');
        if (!lb || !lb.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') show(current - 1);
        if (e.key === 'ArrowRight') show(current + 1);
    });
})();
</script>
{{ end }}
