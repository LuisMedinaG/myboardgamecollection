{{ define "content" }}
<a href="/" class="inline-flex items-center gap-1 text-accent text-sm font-medium py-2 hover:underline" style="-webkit-tap-highlight-color:transparent">&#8592; Home</a>
<header class="py-4 mb-2">
    <h1 class="text-[1.5rem] font-extrabold">Manage Vibes</h1>
    <p class="text-muted text-[0.95rem] mt-1">Add, edit, or remove mood tags</p>
</header>

{{ if .Error }}
<div class="bg-danger-soft text-danger border border-danger-border rounded-lg px-4 py-3 mb-4 text-sm">{{ .Error }}</div>
{{ end }}

<form method="POST" action="/vibes" class="flex gap-2 mb-5">
    <input type="text" name="name" placeholder="New vibe name…" required class="flex-1 min-w-0">
    <button type="submit" class="btn btn-primary btn-sm">Add</button>
</form>

{{ if gt (len .Vibes) 0 }}
<div class="flex flex-col gap-2" id="vibe-manage-list">
    {{ range .Vibes }}
    <div class="flex items-center gap-2 bg-surface border border-edge rounded-lg px-3 py-2">
        <input type="text" value="{{ .Name }}"
               data-id="{{ .ID }}" data-original="{{ .Name }}"
               class="vibe-edit-input flex-1 min-w-0 border-none bg-transparent p-0 text-sm font-medium focus:outline-none focus:ring-0"
               required>
        <form method="POST" action="/vibes/{{ .ID }}/delete" class="flex-shrink-0"
              onsubmit="return confirm('Delete this vibe? Games tagged with it will be untagged.')">
            <button type="submit"
                    class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-transparent border-none cursor-pointer text-danger hover:bg-danger-soft transition-colors text-sm"
                    title="Delete">&times;</button>
        </form>
    </div>
    {{ end }}
</div>
<div class="sticky bottom-4 mt-5 flex justify-center">
    <button type="button" id="vibe-save-btn"
            class="btn btn-primary shadow-modal"
            disabled>Save Changes</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const saveBtn = document.getElementById('vibe-save-btn');
    const inputs = document.querySelectorAll('.vibe-edit-input');

    const checkForChanges = () => {
        const hasChanges = Array.from(inputs).some(input =>
            input.value !== input.dataset.original
        );
        saveBtn.disabled = !hasChanges;
    };

    inputs.forEach(input => {
        input.addEventListener('input', checkForChanges);
    });

    saveBtn.addEventListener('click', () => {
        const changes = {};
        inputs.forEach(input => {
            if (input.value !== input.dataset.original) {
                changes[input.dataset.id] = input.value;
            }
        });

        if (Object.keys(changes).length === 0) return;

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/vibes/batch-update';
        form.style.display = 'none';

        const csrfInput = document.createElement('input');
        csrfInput.type = 'hidden';
        csrfInput.name = '_csrf';
        csrfInput.value = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        form.appendChild(csrfInput);

        const dataInput = document.createElement('input');
        dataInput.type = 'hidden';
        dataInput.name = 'updates';
        dataInput.value = JSON.stringify(changes);
        form.appendChild(dataInput);

        document.body.appendChild(form);
        form.submit();
    });
});
</script>
{{ else }}
<p class="text-center text-muted py-8">No vibes yet.<br>Add one using the form above.</p>
{{ end }}
{{ end }}
