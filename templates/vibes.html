{{ define "content" }}
<a href="/" class="back-btn">&#8592; Home</a>
<header class="header">
    <h1>Manage Vibes</h1>
    <p class="subtitle">Add, edit, or remove mood tags</p>
</header>

{{ if .Error }}
<div class="import-error">{{ .Error }}</div>
{{ end }}

<form method="POST" action="/vibes" class="vibe-add-form">
    <input type="text" name="name" placeholder="New vibe name..." class="form-input" required>
    <button type="submit" class="btn btn-primary btn-sm">Add</button>
</form>

{{ if gt (len .Vibes) 0 }}
<div class="vibe-manage-list">
    {{ range .Vibes }}
    <div class="vibe-manage-item">
        <input type="text" value="{{ .Name }}" data-id="{{ .ID }}" data-original="{{ .Name }}" class="form-input vibe-edit-input" required>
        <form method="POST" action="/vibes/{{ .ID }}/delete" class="vibe-delete-inline" onsubmit="return confirm('Delete this vibe? Games tagged with it will be untagged.')">
            <button type="submit" class="btn-icon btn-icon-danger vibe-delete-btn" title="Delete">&times;</button>
        </form>
    </div>
    {{ end }}
</div>
<div class="vibe-save-bar">
    <button type="button" id="vibe-save-btn" class="btn btn-primary" disabled>Save Changes</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const saveBtn = document.getElementById('vibe-save-btn');
    const inputs = document.querySelectorAll('.vibe-edit-input');

    const checkForChanges = () => {
        const hasChanges = Array.from(inputs).some(input =>
            input.value !== input.dataset.original
        );
        saveBtn.disabled = !hasChanges;
    };

    inputs.forEach(input => {
        input.addEventListener('input', checkForChanges);
    });

    saveBtn.addEventListener('click', () => {
        const changes = {};
        inputs.forEach(input => {
            if (input.value !== input.dataset.original) {
                changes[input.dataset.id] = input.value;
            }
        });

        if (Object.keys(changes).length === 0) return;

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/vibes/batch-update';
        form.style.display = 'none';

        const dataInput = document.createElement('input');
        dataInput.type = 'hidden';
        dataInput.name = 'updates';
        dataInput.value = JSON.stringify(changes);
        form.appendChild(dataInput);

        document.body.appendChild(form);
        form.submit();
    });
});
</script>
{{ else }}
<p class="empty-state">No vibes yet. Add one above.</p>
{{ end }}
{{ end }}
