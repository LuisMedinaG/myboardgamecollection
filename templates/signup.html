{{ define "content" }}
<div class="login-hero">
    <article class="login-card">
        <h1 class="login-title">Create Account</h1>
        <p class="login-desc">
            Choose a username and password to get started.
        </p>
        <form method="post" action="/signup" class="login-form" id="signup-form">
            <label>
                Username
                <input type="text" name="username" placeholder="Username" required autofocus autocomplete="username">
            </label>
            <label>
                Password (min 8 characters)
                <input type="password" name="password" placeholder="Password" required minlength="8" autocomplete="new-password">
            </label>
            <label>
                Retype Password
                <input type="password" name="password2" placeholder="Retype Password" required minlength="8" autocomplete="new-password">
            </label>
            <label>
                BGG Username <span class="form-optional">(optional)</span>
                <input type="text" name="bgg_username" placeholder="BoardGameGeek username" autocomplete="off">
                <small class="form-hint">Used for syncing your BGG collection. You can add this later.</small>
            </label>
            <label>
                Email <span class="form-optional">(optional)</span>
                <input type="email" name="email" placeholder="Email address" autocomplete="email">
                <small class="form-hint">For account recovery.</small>
            </label>
            <div id="password-error" class="login-error" style="display:none;">Passwords do not match.</div>
            <button type="submit" class="btn btn-primary login-btn">Create Account</button>
        </form>
        {{ if .Error }}
        <div class="login-error">{{ .Error }}</div>
        {{ end }}
        <p class="login-note">
            Already have an account? <a href="/login">Sign in here</a>.
        </p>
    </article>
</div>
<script>
(function(){
    var form = document.getElementById('signup-form');
    var pw1 = document.querySelector('#signup-form input[name="password"]');
    var pw2 = document.querySelector('#signup-form input[name="password2"]');
    var errDiv = document.getElementById('password-error');
    form.addEventListener('submit', function(e){
        if (pw1.value !== pw2.value) {
            e.preventDefault();
            errDiv.style.display = 'block';
            pw2.focus();
        } else {
            errDiv.style.display = 'none';
        }
    });
})();
</script>
{{ end }}
