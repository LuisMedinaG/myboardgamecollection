{{ define "content" }}
<div class="login-hero">
    <div class="login-card">
        <h1 class="login-title">Create Account</h1>
        <p class="login-desc">
            Enter your <a href="https://boardgamegeek.com" target="_blank" rel="noopener">BoardGameGeek</a>
            username and choose a password.
        </p>
        <form method="post" action="/signup" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ $.CSRFToken }}">
            <div class="form-group">
                <label for="username">BGG Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="BGG Username"
                    required
                    autofocus
                    class="form-input login-input"
                >
            </div>
            <div class="form-group">
                <label for="password">Password (min 8 characters)</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required
                    minlength="8"
                    class="form-input login-input"
                >
            </div>
            <button type="submit" class="btn btn-primary login-btn">Create Account</button>
        </form>
        {{ if .Error }}
        <div class="login-error">{{ .Error }}</div>
        {{ end }}
        <p class="login-note">
            Already have an account? <a href="/login">Sign in here</a>.
        </p>
    </div>
</div>
{{ end }}
