{{ define "content" }}
<div class="login-hero">
    <div class="login-card">
        <h1 class="login-title">Create Account</h1>
        <p class="login-desc">
            Choose a username and password to get started.
        </p>
        <form method="post" action="/signup" class="login-form" id="signup-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Username"
                    required
                    autofocus
                    class="form-input login-input"
                >
            </div>
            <div class="form-group">
                <label for="password">Password (min 8 characters)</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required
                    minlength="8"
                    class="form-input login-input"
                >
            </div>
            <div class="form-group">
                <label for="password2">Retype Password</label>
                <input
                    type="password"
                    id="password2"
                    name="password2"
                    placeholder="Retype Password"
                    required
                    minlength="8"
                    class="form-input login-input"
                >
            </div>
            <div class="form-group">
                <label for="bgg_username">BGG Username <span class="form-optional">(optional)</span></label>
                <input
                    type="text"
                    id="bgg_username"
                    name="bgg_username"
                    placeholder="BoardGameGeek username"
                    class="form-input login-input"
                >
                <small class="form-hint">Used for syncing your BGG collection. You can add this later.</small>
            </div>
            <div class="form-group">
                <label for="email">Email <span class="form-optional">(optional)</span></label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email address"
                    class="form-input login-input"
                >
                <small class="form-hint">For account recovery.</small>
            </div>
            <div id="password-error" class="login-error" style="display:none;">Passwords do not match.</div>
            <button type="submit" class="btn btn-primary login-btn">Create Account</button>
        </form>
        {{ if .Error }}
        <div class="login-error">{{ .Error }}</div>
        {{ end }}
        <p class="login-note">
            Already have an account? <a href="/login">Sign in here</a>.
        </p>
    </div>
</div>
<script>
(function(){
    var form = document.getElementById('signup-form');
    var pw1 = document.getElementById('password');
    var pw2 = document.getElementById('password2');
    var errDiv = document.getElementById('password-error');
    form.addEventListener('submit', function(e){
        if (pw1.value !== pw2.value) {
            e.preventDefault();
            errDiv.style.display = 'block';
            pw2.focus();
        } else {
            errDiv.style.display = 'none';
        }
    });
})();
</script>
{{ end }}
