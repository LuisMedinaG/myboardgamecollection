<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ .Title }} — Board Game Collection</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {{ if .CSRFToken }}<meta name="csrf-token" content="{{ .CSRFToken }}">{{ end }}
</head>
<body class="max-w-[600px] mx-auto min-h-dvh bg-canvas text-ink" hx-headers='{"X-CSRF-Token": "{{ .CSRFToken }}"}'>
    {{ if .User }}
    <nav class="relative flex items-center gap-2 px-5 min-h-[52px] bg-accent text-white sticky top-0 z-[100] shadow-[0_2px_6px_rgba(0,0,0,0.15)]">
        <button class="flex items-center justify-center w-10 h-10 flex-shrink-0 bg-transparent border-none text-white cursor-pointer" id="burger-btn" aria-label="Toggle menu" aria-expanded="false">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <rect y="3" width="20" height="2" rx="1" fill="currentColor"/>
                <rect y="9" width="20" height="2" rx="1" fill="currentColor"/>
                <rect y="15" width="20" height="2" rx="1" fill="currentColor"/>
            </svg>
        </button>
        <a href="/" class="font-bold text-white no-underline whitespace-nowrap flex-shrink-0 py-1">&#127922; My Collection</a>
        <div class="flex items-center ml-auto relative">
            <button class="p-0 border-none bg-transparent cursor-pointer" id="profile-btn" aria-label="User menu" aria-expanded="false">
                <span class="flex items-center justify-center w-[34px] h-[34px] rounded-full bg-white/20 text-white text-[0.875rem] font-bold uppercase border-2 border-white/40 transition-colors hover:border-white/70">{{ slice .User 0 1 }}</span>
            </button>
            <div class="hidden absolute top-[calc(100%+8px)] right-0 bg-surface rounded-lg shadow-[0_4px_16px_rgba(0,0,0,0.15)] py-2 min-w-[160px] z-[101]" id="profile-dropdown">
                <span class="block px-4 py-2 text-sm text-muted border-b border-edge mb-1">{{ .User }}</span>
                <a href="/profile/change-password" class="block px-4 py-2 text-sm text-ink no-underline hover:bg-accent-soft">Change password</a>
                <form method="post" action="/logout" class="m-0">
                    <button type="submit" class="block w-full text-left px-4 py-2 text-sm text-ink bg-transparent border-none cursor-pointer hover:bg-canvas min-h-[36px]">Sign out</button>
                </form>
            </div>
        </div>
        <div class="hidden fixed inset-0 z-[98]" id="nav-overlay"></div>
        <div class="hidden absolute top-full left-0 right-0 bg-accent shadow-[0_4px_12px_rgba(0,0,0,0.2)] py-2 z-[99]" id="nav-menu">
            <a href="/games"   class="block text-white/85 no-underline px-5 py-3 hover:bg-white/15 hover:text-white transition-colors">Games</a>
            <a href="/discover" class="block text-white/85 no-underline px-5 py-3 hover:bg-white/15 hover:text-white transition-colors">Discover</a>
            <a href="/vibes"   class="block text-white/85 no-underline px-5 py-3 hover:bg-white/15 hover:text-white transition-colors">Vibes</a>
            <a href="/import"  class="block text-white/85 no-underline px-5 py-3 hover:bg-white/15 hover:text-white transition-colors">Sync</a>
        </div>
    </nav>
    <script>
    (function(){
        var burger = document.getElementById('burger-btn');
        var menu = document.getElementById('nav-menu');
        var overlay = document.getElementById('nav-overlay');
        var profileBtn = document.getElementById('profile-btn');
        var profileDrop = document.getElementById('profile-dropdown');
        function closeMenu(){
            burger.setAttribute('aria-expanded','false');
            menu.classList.add('hidden'); menu.classList.remove('flex');
            overlay.classList.add('hidden'); overlay.classList.remove('block');
        }
        function closeProfile(){
            profileBtn.setAttribute('aria-expanded','false');
            profileDrop.classList.add('hidden'); profileDrop.classList.remove('block');
        }
        function closeAll(){ closeMenu(); closeProfile(); }
        burger.addEventListener('click', function(){
            closeProfile();
            if (burger.getAttribute('aria-expanded') === 'true') { closeMenu(); } else {
                burger.setAttribute('aria-expanded','true');
                menu.classList.remove('hidden'); menu.classList.add('flex'); menu.style.flexDirection = 'column';
                overlay.classList.remove('hidden'); overlay.classList.add('block');
            }
        });
        profileBtn.addEventListener('click', function(){
            closeMenu();
            if (profileBtn.getAttribute('aria-expanded') === 'true') { closeProfile(); } else {
                profileBtn.setAttribute('aria-expanded','true');
                profileDrop.classList.remove('hidden'); profileDrop.classList.add('block');
            }
        });
        overlay.addEventListener('click', closeAll);
        menu.querySelectorAll('a').forEach(function(l){ l.addEventListener('click', closeAll); });
    })();
    </script>
    {{ end }}
    <main class="px-4 pb-8">
        {{ template "content" .Data }}
    </main>
    {{ if .CSRFToken }}
    <script>
    (function(){
        var token = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        document.querySelectorAll('form').forEach(function(f){
            if (f.querySelector('input[name="_csrf"]')) return;
            var inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = '_csrf'; inp.value = token;
            f.appendChild(inp);
        });
        document.body.addEventListener('htmx:afterSwap', function(evt){
            evt.detail.elt.querySelectorAll('form').forEach(function(f){
                if (f.querySelector('input[name="_csrf"]')) return;
                var inp = document.createElement('input');
                inp.type = 'hidden'; inp.name = '_csrf'; inp.value = token;
                f.appendChild(inp);
            });
        });
        document.body.addEventListener('htmx:configRequest', function(evt){
            evt.detail.headers['X-CSRF-Token'] = token;
        });
    })();
    </script>
    {{ end }}
</body>
</html>
