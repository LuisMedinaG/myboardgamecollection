{{ define "content" }}
<div class="min-h-[calc(100dvh-2rem)] flex items-center justify-center py-8">
    <article class="w-full max-w-[400px] bg-surface border border-edge rounded-xl shadow-card px-8 py-10 text-center">
        <h1 class="text-[1.6rem] font-extrabold text-accent mb-3">Board Game Collection</h1>
        <p class="text-muted text-[0.95rem] mb-7 leading-relaxed">Sign in with your username and password.</p>
        <form method="post" action="/login" class="flex flex-col gap-3 mb-4">
            <label class="text-left text-sm font-semibold text-muted flex flex-col gap-1">
                Username
                <input type="text" name="username" placeholder="Username" required autofocus autocomplete="username" class="w-full">
            </label>
            <label class="text-left text-sm font-semibold text-muted flex flex-col gap-1">
                Password
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password" class="w-full">
            </label>
            <button type="submit" class="btn btn-primary w-full mt-1">Sign In</button>
        </form>
        {{ if .Error }}
        <div class="bg-danger-soft text-danger border border-danger-border rounded-lg px-3.5 py-2.5 text-sm text-left mt-2">{{ .Error }}</div>
        {{ end }}
        <p class="text-muted text-[0.82rem] mt-5 leading-relaxed">
            Don't have an account? <a href="/signup" class="text-accent font-semibold hover:underline">Sign up here</a>.
        </p>
    </article>
</div>
{{ end }}
