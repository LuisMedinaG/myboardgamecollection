{{ define "content" }}
<a href="/" class="back-btn">&#8592; Home</a>
<div class="filters" id="game-filters" hx-get="/games" hx-target="#games-result" hx-trigger="change" hx-push-url="true" hx-swap="innerHTML" hx-include="this">
    <input type="search" name="q" value="{{ .Q }}" placeholder="Search games…" class="filter-search"
           hx-trigger="input changed delay:300ms, search"
           hx-get="/games" hx-target="#games-result" hx-push-url="true" hx-swap="innerHTML" hx-include="#game-filters">
    <select name="category" class="filter-select">
        <option value="">All Categories</option>
        {{ range .Categories }}
        <option value="{{ . }}" {{ if eq . $.Category }}selected{{ end }}>{{ . }}</option>
        {{ end }}
    </select>
    <select name="players" class="filter-select">
        <option value="">Any Players</option>
        <option value="1" {{ if eq .Players "1" }}selected{{ end }}>1 player</option>
        <option value="2only" {{ if eq .Players "2only" }}selected{{ end }}>Only 2</option>
        <option value="3" {{ if eq .Players "3" }}selected{{ end }}>Up to 3</option>
        <option value="4" {{ if eq .Players "4" }}selected{{ end }}>Up to 4</option>
        <option value="5plus" {{ if eq .Players "5plus" }}selected{{ end }}>5+</option>
    </select>
    <select name="playtime" class="filter-select">
        <option value="">Any Duration</option>
        <option value="short" {{ if eq .Playtime "short" }}selected{{ end }}>&lt; 30 min</option>
        <option value="medium" {{ if eq .Playtime "medium" }}selected{{ end }}>30–60 min</option>
        <option value="long" {{ if eq .Playtime "long" }}selected{{ end }}>&gt; 60 min</option>
    </select>
</div>
<div class="active-filters" id="active-filters"></div>

{{ if .AllVibes }}
<button type="button" class="btn btn-secondary btn-sm" id="select-mode-toggle">Select</button>
{{ end }}

<div id="games-result">
    {{ template "games_result" .Games }}
</div>

<!-- Floating bar shown when games are selected -->
<div class="bulk-bar" id="bulk-bar" style="display:none;">
    <span id="bulk-count">0 selected</span>
    <button type="button" class="btn btn-primary btn-sm" id="bulk-assign-btn">Assign Vibes</button>
</div>

<!-- Vibe assignment modal -->
<div class="modal-overlay" id="vibe-modal" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">Assign Vibes</h3>
            <button type="button" class="chip-remove" id="modal-close">&times;</button>
        </div>
        <form id="bulk-vibe-form" method="POST" action="/games/bulk-vibes">
            <div class="vibe-checklist">
                {{ range .AllVibes }}
                <label class="vibe-check-item">
                    <input type="checkbox" name="vibes" value="{{ .ID }}">
                    <span class="vibe-check-label">{{ .Name }}</span>
                </label>
                {{ end }}
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="modal-submit" disabled>Assign to&nbsp;<span id="modal-count">0</span>&nbsp;games</button>
        </form>
    </div>
</div>

<script>
(function() {
    var labels = {category: 'Category', players: 'Players', playtime: 'Duration'};
    function updateChips() {
        var container = document.getElementById('active-filters');
        var selects = document.querySelectorAll('#game-filters select');
        container.innerHTML = '';
        selects.forEach(function(sel) {
            if (sel.value) {
                var chip = document.createElement('span');
                chip.className = 'filter-chip';
                var text = sel.options[sel.selectedIndex].text;
                chip.appendChild(document.createTextNode(labels[sel.name] + ': '));

                var strong = document.createElement('strong');
                strong.textContent = text;
                chip.appendChild(strong);
                chip.appendChild(document.createTextNode(' '));

                var button = document.createElement('button');
                button.className = 'chip-remove';
                button.setAttribute('data-name', sel.name);
                button.setAttribute('type', 'button');
                button.textContent = '\u00D7';
                chip.appendChild(button);

                container.appendChild(chip);
            }
        });
    }
    document.getElementById('active-filters').addEventListener('click', function(e) {
        var btn = e.target.closest('.chip-remove');
        if (!btn) return;
        var name = btn.getAttribute('data-name');
        var sel = document.querySelector('#game-filters select[name="' + name + '"]');
        sel.value = '';
        sel.dispatchEvent(new Event('change', {bubbles: true}));
    });
    document.getElementById('game-filters').addEventListener('change', function() {
        setTimeout(updateChips, 0);
    });
    updateChips();

    // Multi-select mode
    var toggle = document.getElementById('select-mode-toggle');
    var bulkBar = document.getElementById('bulk-bar');
    var modal = document.getElementById('vibe-modal');
    var selectMode = false;

    if (toggle) {
        toggle.addEventListener('click', function() {
            selectMode = !selectMode;
            toggle.textContent = selectMode ? 'Cancel' : 'Select';
            applySelectMode();
        });
    }

    function applySelectMode() {
        var checks = document.querySelectorAll('.game-select-check');
        var links = document.querySelectorAll('.game-list-link');
        checks.forEach(function(el) { el.style.display = selectMode ? '' : 'none'; });
        links.forEach(function(el) {
            if (selectMode) {
                el.setAttribute('data-href', el.getAttribute('href'));
                el.removeAttribute('href');
                el.style.cursor = 'pointer';
            } else {
                var href = el.getAttribute('data-href');
                if (href) el.setAttribute('href', href);
                el.style.cursor = '';
            }
        });
        if (!selectMode) {
            document.querySelectorAll('.game-select-check input').forEach(function(cb) { cb.checked = false; });
            bulkBar.style.display = 'none';
            modal.style.display = 'none';
        }
        updateBulkCount();
    }

    // Click on game row toggles checkbox in select mode
    document.addEventListener('click', function(e) {
        if (!selectMode) return;
        var link = e.target.closest('.game-list-link');
        if (!link) return;
        e.preventDefault();
        var wrap = link.closest('.game-list-item-wrap');
        if (!wrap) return;
        var cb = wrap.querySelector('.game-select-check input');
        if (cb) {
            cb.checked = !cb.checked;
            updateBulkCount();
        }
    });

    function getSelectedCount() {
        return document.querySelectorAll('.game-select-check input:checked').length;
    }

    function updateBulkCount() {
        var count = getSelectedCount();
        var countEl = document.getElementById('bulk-count');
        var modalCount = document.getElementById('modal-count');
        countEl.textContent = count + ' selected';
        modalCount.textContent = count;
        bulkBar.style.display = (selectMode && count > 0) ? '' : 'none';
    }

    // Checkbox change events
    document.addEventListener('change', function(e) {
        if (e.target.closest('.game-select-check')) updateBulkCount();
    });

    // Open modal
    document.getElementById('bulk-assign-btn').addEventListener('click', function() {
        modal.style.display = '';
    });

    // Close modal
    document.getElementById('modal-close').addEventListener('click', function() {
        modal.style.display = 'none';
    });
    modal.addEventListener('click', function(e) {
        if (e.target === modal) modal.style.display = 'none';
    });

    // Enable submit only when vibes are checked
    var vibeChecks = document.querySelectorAll('#bulk-vibe-form .vibe-check-item input');
    var submitBtn = document.getElementById('modal-submit');
    vibeChecks.forEach(function(cb) {
        cb.addEventListener('change', function() {
            var any = Array.prototype.some.call(vibeChecks, function(c) { return c.checked; });
            submitBtn.disabled = !any;
        });
    });

    // Re-apply select mode after HTMX swaps new content
    document.body.addEventListener('htmx:afterSwap', function(e) {
        if (e.detail.target.id === 'games-result') {
            applySelectMode();
        }
    });
})();
</script>
{{ end }}
