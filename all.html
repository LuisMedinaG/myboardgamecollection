<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Games — My Board Game Collection</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="index.html" class="back-btn">&#8592; Back</a>
  <h2 class="step-title" id="title" style="margin-top:0.5rem"></h2>
  <div class="game-list" id="game-list"></div>
  <script src="js/data.js"></script>
  <script>
    async function initAll() {
      var games = await loadGames();
      document.getElementById("title").textContent = "All Board Games (" + games.length + ")";
      var list = document.getElementById("game-list");
      games
        .sort(function(a, b) { return a.name.localeCompare(b.name); })
        .forEach(function(g) {
          var a = document.createElement("a");
          a.className = "game-list-item";
          a.href = "game.html?id=" + g.id;
          var borrowed = g.isBorrowed ? ' <span style="color:#ff9800;font-weight:600;">📤 Borrowed</span>' : '';
          a.innerHTML =
            '<div>' +
              '<div class="game-list-name">' + g.name + borrowed + '</div>' +
              '<div class="game-list-meta">' + g.players.min + '-' + g.players.max + ' players &middot; ' + g.playtime + ' min &middot; ' + g.location + '</div>' +
            '</div>';
          list.appendChild(a);
        });
    }
    initAll();
  </script>
</body>
</html>
