<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Game — My Board Game Collection</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="index.html" class="back-btn">&#8592; Back</a>
  <h2 class="step-title" style="margin-top:0.5rem">Add New Game</h2>

  <form id="add-game-form" class="add-game-form">
    <div class="form-group">
      <label for="name">Game Name *</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label for="genre">Genre *</label>
      <select id="genre" name="genre" required>
        <option value="">Select genre</option>
        <option value="family">Family</option>
        <option value="party">Party</option>
        <option value="strategy">Strategy</option>
        <option value="cooperative">Cooperative</option>
        <option value="abstract">Abstract</option>
      </select>
    </div>

    <div class="form-group">
      <label for="subgenre">Sub-genre *</label>
      <input type="text" id="subgenre" name="subgenre" placeholder="e.g., dice-game" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="min-players">Min Players *</label>
        <input type="number" id="min-players" name="minPlayers" min="1" required>
      </div>
      <div class="form-group">
        <label for="max-players">Max Players *</label>
        <input type="number" id="max-players" name="maxPlayers" min="1" required>
      </div>
    </div>

    <div class="form-group">
      <label for="playtime">Play Time (min) *</label>
      <input type="number" id="playtime" name="playtime" min="1" required>
    </div>

    <div class="form-group">
      <label for="quickref">Quick Reference</label>
      <textarea id="quickref" name="quickref" rows="4" placeholder="Tips, rules to remember..."></textarea>
    </div>

    <div class="form-group">
      <label for="bgg-id">BGG ID (optional)</label>
      <input type="number" id="bgg-id" name="bggId" placeholder="e.g., 13">
    </div>

    <div class="form-group">
      <label for="location">Location / Status *</label>
      <input type="text" id="location" name="location" placeholder="e.g., Shelf A, Borrowed from John" required>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" id="is-borrowed" name="isBorrowed">
        Borrowed
      </label>
    </div>

    <button type="submit" class="submit-btn">Add Game</button>
  </form>

  <script src="js/data.js"></script>
  <script>
    document.getElementById("add-game-form").addEventListener("submit", async function(e) {
      e.preventDefault();

      // Get form data
      const form = e.target;
      const newGame = {
        id: form.name.value.toLowerCase().replace(/\s+/g, "-"),
        name: form.name.value,
        genre: form.genre.value,
        subgenre: form.subgenre.value,
        players: {
          min: parseInt(form.minPlayers.value),
          max: parseInt(form.maxPlayers.value)
        },
        playtime: parseInt(form.playtime.value),
        quickref: form.quickref.value || "",
        bggId: form.bggId.value ? parseInt(form.bggId.value) : null,
        location: form.location.value,
        isBorrowed: form.isBorrowed.checked
      };

      // Load games from both data.json and localStorage
      let games = await loadGames();
      const localGames = JSON.parse(localStorage.getItem("customGames") || "[]");

      // Combine and check for duplicates
      const allGames = [...games, ...localGames];
      if (allGames.some(g => g.id === newGame.id)) {
        alert("A game with this ID already exists. Try a different name.");
        return;
      }

      // Save to localStorage
      localGames.push(newGame);
      localStorage.setItem("customGames", JSON.stringify(localGames));

      alert("Game added successfully!");
      form.reset();
      window.location.href = "all.html";
    });
  </script>
</body>
</html>
