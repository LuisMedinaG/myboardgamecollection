<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Game — My Board Game Collection</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="index.html" class="back-btn">&#8592; Back</a>
  <h2 class="step-title" style="margin-top:0.5rem">Add New Game</h2>

  <form id="add-game-form" class="add-game-form">
    <div class="form-group">
      <label for="name">Game Name *</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label for="genre">Genre *</label>
      <select id="genre" name="genre" required>
        <option value="">Select genre</option>
      </select>
      <input type="text" id="genre-new" placeholder="New genre name" style="display:none;margin-top:0.5rem;">
    </div>

    <div class="form-group">
      <label for="subgenre">Sub-genre *</label>
      <select id="subgenre" name="subgenre" required>
        <option value="">Select sub-genre</option>
      </select>
      <input type="text" id="subgenre-new" placeholder="New sub-genre name" style="display:none;margin-top:0.5rem;">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="min-players">Min Players *</label>
        <input type="number" id="min-players" name="minPlayers" min="1" required>
      </div>
      <div class="form-group">
        <label for="max-players">Max Players *</label>
        <input type="number" id="max-players" name="maxPlayers" min="1" required>
      </div>
    </div>

    <div class="form-group">
      <label for="playtime">Play Time *</label>
      <select id="playtime" name="playtime" required>
        <option value="">Select duration</option>
        <option value="5">5 min</option>
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="60">1 hour</option>
        <option value="120">2+ hours</option>
      </select>
    </div>

    <div class="form-group">
      <label for="quickref">Quick Reference</label>
      <textarea id="quickref" name="quickref" rows="4" placeholder="Tips, rules to remember..."></textarea>
    </div>

    <div class="form-group">
      <label for="bgg-id">BGG ID (optional)</label>
      <input type="number" id="bgg-id" name="bggId" placeholder="e.g., 13">
    </div>

    <div class="form-group">
      <label for="location">Location / Status *</label>
      <input type="text" id="location" name="location" placeholder="e.g., Shelf A, Borrowed from John" required>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" id="is-borrowed" name="isBorrowed">
        Borrowed
      </label>
    </div>

    <button type="submit" class="submit-btn">Add Game</button>
  </form>

  <script src="js/data.js"></script>
  <script>
    const GENRE_SUBGENRE_MAP = {
      family: ["dice-game", "card-game", "board-game"],
      party: ["word-game", "bluffing", "trivia"],
      strategy: ["resource-management", "worker-placement", "area-control"],
      cooperative: ["puzzle", "adventure", "survival"],
      abstract: ["pattern", "logic", "connection"],
      drinking: ["party-game", "challenge"]
    };

    const genreSelect = document.getElementById("genre");
    const subgenreSelect = document.getElementById("subgenre");
    const genreNewInput = document.getElementById("genre-new");
    const subgenreNewInput = document.getElementById("subgenre-new");

    // Populate genre dropdown from data
    async function initForm() {
      const games = await loadGames();
      const allGenres = new Set(games.map(g => g.genre));
      Array.from(allGenres).sort().forEach(genre => {
        const opt = document.createElement("option");
        opt.value = genre;
        opt.textContent = genre.charAt(0).toUpperCase() + genre.slice(1);
        genreSelect.appendChild(opt);
      });

      // Add "Add new genre" option
      const addNewGenre = document.createElement("option");
      addNewGenre.value = "__add_new__";
      addNewGenre.textContent = "+ Add new genre";
      genreSelect.appendChild(addNewGenre);
    }

    initForm();

    // Genre change listener
    genreSelect.addEventListener("change", function() {
      genreNewInput.style.display = this.value === "__add_new__" ? "block" : "none";
      if (this.value === "__add_new__") {
        genreNewInput.focus();
      }
      updateSubgenreDropdown();
    });

    // Update subgenre dropdown based on genre
    function updateSubgenreDropdown() {
      subgenreSelect.innerHTML = '<option value="">Select sub-genre</option>';

      let selectedGenre = genreSelect.value;
      if (selectedGenre === "__add_new__") {
        subgenreSelect.disabled = true;
        subgenreNewInput.style.display = "block";
        return;
      }

      const subgenres = GENRE_SUBGENRE_MAP[selectedGenre] || [];
      subgenres.sort().forEach(sub => {
        const opt = document.createElement("option");
        opt.value = sub;
        opt.textContent = sub.split("-").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
        subgenreSelect.appendChild(opt);
      });

      // Add "Add new sub-genre" option
      const addNewSub = document.createElement("option");
      addNewSub.value = "__add_new__";
      addNewSub.textContent = "+ Add new sub-genre";
      subgenreSelect.appendChild(addNewSub);

      subgenreSelect.disabled = false;
      subgenreNewInput.style.display = "none";
    }

    // Sub-genre change listener
    subgenreSelect.addEventListener("change", function() {
      subgenreNewInput.style.display = this.value === "__add_new__" ? "block" : "none";
      if (this.value === "__add_new__") {
        subgenreNewInput.focus();
      }
    });

    // Form submission
    document.getElementById("add-game-form").addEventListener("submit", async function(e) {
      e.preventDefault();

      const form = e.target;
      let genre = genreSelect.value;
      let subgenre = subgenreSelect.value;

      // Handle new genre
      if (genre === "__add_new__") {
        genre = genreNewInput.value.trim().toLowerCase();
        if (!genre) {
          alert("Please enter a genre name");
          return;
        }
      }

      // Handle new sub-genre
      if (subgenre === "__add_new__") {
        subgenre = subgenreNewInput.value.trim().toLowerCase().replace(/\s+/g, "-");
        if (!subgenre) {
          alert("Please enter a sub-genre name");
          return;
        }
      }

      if (!genre || !subgenre) {
        alert("Please select or add genre and sub-genre");
        return;
      }

      const newGame = {
        id: form.name.value.toLowerCase().replace(/\s+/g, "-"),
        name: form.name.value,
        genre: genre,
        subgenre: subgenre,
        players: {
          min: parseInt(form.minPlayers.value),
          max: parseInt(form.maxPlayers.value)
        },
        playtime: parseInt(form.playtime.value),
        quickref: form.quickref.value || "",
        bggId: form.bggId.value ? parseInt(form.bggId.value) : null,
        location: form.location.value,
        isBorrowed: form.isBorrowed.checked
      };

      // Load games and check for duplicates
      let games = await loadGames();
      if (games.some(g => g.id === newGame.id)) {
        alert("A game with this ID already exists. Try a different name.");
        return;
      }

      // Save to localStorage
      const localGames = JSON.parse(localStorage.getItem("customGames") || "[]");
      localGames.push(newGame);
      localStorage.setItem("customGames", JSON.stringify(localGames));

      alert("Game added successfully!");
      form.reset();
      window.location.href = "all.html";
    });
  </script>
</body>
</html>
